<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ChatFlow</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg: #0d1117; --surface: #161b22; --surface2: #1c2128; --surface3: #21262d;
  --border: #30363d; --text: #e6edf3; --text-muted: #7d8590; --text-dim: #484f58;
  --accent: #2dba4e; --accent-dark: #238636; --accent-glow: rgba(45,186,78,.15);
  --danger: #f85149; --radius: 18px; --sidebar: 300px;
}
body { font-family: 'DM Sans', sans-serif; background: var(--bg); color: var(--text); height: 100dvh; overflow: hidden; display: flex; }
::-webkit-scrollbar { width: 3px; } ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

/* WAKE UP SCREEN */
#wake-screen {
  position: fixed; inset: 0; z-index: 200; background: var(--bg);
  display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 20px;
}
.wake-icon { font-size: 52px; animation: pulse 1.5s ease-in-out infinite; }
@keyframes pulse { 0%,100%{transform:scale(1);opacity:1} 50%{transform:scale(1.08);opacity:.7} }
.wake-title { font-size: 22px; font-weight: 600; letter-spacing: -0.3px; }
.wake-sub { font-size: 13px; color: var(--text-muted); }
.wake-dots { display: flex; gap: 6px; }
.wake-dots span {
  width: 8px; height: 8px; border-radius: 50%; background: var(--accent);
  animation: blink 1.2s ease-in-out infinite;
}
.wake-dots span:nth-child(2) { animation-delay: .2s; }
.wake-dots span:nth-child(3) { animation-delay: .4s; }
@keyframes blink { 0%,100%{opacity:.2} 50%{opacity:1} }

/* AUTH */
#auth-screen {
  position: fixed; inset: 0; z-index: 100; background: var(--bg);
  display: none; align-items: center; justify-content: center;
}
.auth-card {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: 24px; padding: 44px 40px; width: 390px;
  box-shadow: 0 24px 60px rgba(0,0,0,.5); animation: fadeUp .35s ease;
}
@keyframes fadeUp { from{opacity:0;transform:translateY(20px)} to{opacity:1;transform:translateY(0)} }
.auth-logo { display: flex; align-items: center; gap: 12px; margin-bottom: 32px; }
.auth-logo-icon {
  width: 46px; height: 46px; background: var(--accent); border-radius: 14px;
  display: flex; align-items: center; justify-content: center; font-size: 22px;
  box-shadow: 0 6px 20px rgba(45,186,78,.35);
}
.auth-logo h1 { font-size: 22px; font-weight: 600; letter-spacing: -0.4px; }
.auth-tabs { display: flex; gap: 4px; background: var(--surface2); border-radius: 12px; padding: 4px; margin-bottom: 26px; }
.auth-tab { flex:1; padding: 8px; border: none; background: transparent; color: var(--text-muted); border-radius: 9px; font-family: inherit; font-size: 13px; font-weight: 500; cursor: pointer; transition: all .2s; }
.auth-tab.active { background: var(--surface3); color: var(--text); }
.field { margin-bottom: 14px; }
.field label { display: block; font-size: 11px; color: var(--text-muted); margin-bottom: 5px; font-weight: 600; letter-spacing: .6px; text-transform: uppercase; }
.field input { width: 100%; padding: 12px 14px; background: var(--surface2); border: 1px solid var(--border); border-radius: 11px; color: var(--text); font-family: inherit; font-size: 14px; outline: none; transition: border-color .2s; }
.field input:focus { border-color: var(--accent); }
.field input::placeholder { color: var(--text-dim); }
.btn-primary { width: 100%; padding: 13px; background: var(--accent); color: #fff; border: none; border-radius: 11px; font-family: inherit; font-size: 14px; font-weight: 600; cursor: pointer; transition: all .2s; margin-top: 6px; }
.btn-primary:hover { background: var(--accent-dark); transform: translateY(-1px); }
.err { color: var(--danger); font-size: 12px; margin-top: 8px; display: none; }

/* APP */
#app { display: none; flex: 1; height: 100dvh; }

/* SIDEBAR */
.sidebar { width: var(--sidebar); flex-shrink: 0; background: var(--surface); border-right: 1px solid var(--border); display: flex; flex-direction: column; }
.sidebar-header { padding: 18px 14px 12px; border-bottom: 1px solid var(--border); }
.sidebar-top { display: flex; align-items: center; gap: 8px; margin-bottom: 12px; }
.me-av { width: 36px; height: 36px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: 600; font-size: 14px; color: #fff; flex-shrink: 0; }
.sidebar-title { flex: 1; font-size: 17px; font-weight: 600; letter-spacing: -0.3px; }
.icon-btn { width: 32px; height: 32px; border-radius: 9px; background: transparent; border: 1px solid var(--border); color: var(--text-muted); cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 14px; transition: all .15s; }
.icon-btn:hover { background: var(--surface2); color: var(--text); border-color: var(--accent); }
.search-wrap { background: var(--surface2); border: 1px solid var(--border); border-radius: 11px; display: flex; align-items: center; gap: 7px; padding: 0 11px; transition: border-color .2s; }
.search-wrap:focus-within { border-color: var(--accent); }
.search-wrap span { color: var(--text-muted); font-size: 12px; }
.search-wrap input { flex: 1; background: transparent; border: none; padding: 9px 0; color: var(--text); font-family: inherit; font-size: 13px; outline: none; }
.search-wrap input::placeholder { color: var(--text-dim); }
.conv-list { flex: 1; overflow-y: auto; }
.no-convos { padding: 36px 16px; text-align: center; color: var(--text-muted); font-size: 13px; line-height: 2; }
.conv-item { display: flex; align-items: center; gap: 10px; padding: 10px 14px; cursor: pointer; transition: background .12s; border-left: 3px solid transparent; }
.conv-item:hover { background: var(--surface2); }
.conv-item.active { background: var(--accent-glow); border-left-color: var(--accent); }
.conv-av { width: 44px; height: 44px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: 600; font-size: 17px; color: #fff; flex-shrink: 0; position: relative; }
.group-dot { position: absolute; bottom: -1px; right: -1px; background: var(--accent); border: 2px solid var(--surface); border-radius: 50%; width: 16px; height: 16px; display: flex; align-items: center; justify-content: center; font-size: 9px; }
.conv-info { flex: 1; min-width: 0; }
.conv-name { font-size: 13px; font-weight: 600; margin-bottom: 2px; }
.conv-preview { font-size: 12px; color: var(--text-muted); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.conv-time { font-size: 10px; color: var(--text-dim); flex-shrink: 0; }

/* MODALS */
.overlay { position: fixed; inset: 0; z-index: 50; background: rgba(0,0,0,.65); backdrop-filter: blur(5px); display: none; align-items: center; justify-content: center; }
.overlay.open { display: flex; }
.modal { background: var(--surface); border: 1px solid var(--border); border-radius: 22px; padding: 26px 24px; width: 370px; animation: fadeUp .22s ease; }
.modal h3 { font-size: 15px; font-weight: 600; margin-bottom: 16px; }
.modal-tabs { display: flex; gap: 4px; background: var(--surface2); border-radius: 10px; padding: 3px; margin-bottom: 16px; }
.modal-tab { flex: 1; padding: 7px; border: none; background: transparent; color: var(--text-muted); border-radius: 8px; font-family: inherit; font-size: 12px; font-weight: 600; cursor: pointer; transition: all .2s; }
.modal-tab.active { background: var(--surface3); color: var(--text); }
.modal-input { width: 100%; padding: 11px 13px; background: var(--surface2); border: 1px solid var(--border); border-radius: 11px; color: var(--text); font-family: inherit; font-size: 13px; outline: none; margin-bottom: 10px; transition: border-color .2s; }
.modal-input:focus { border-color: var(--accent); }
.modal-input::placeholder { color: var(--text-dim); }
.user-results { max-height: 200px; overflow-y: auto; }
.user-row { display: flex; align-items: center; gap: 9px; padding: 9px 6px; border-radius: 10px; cursor: pointer; transition: background .12s; }
.user-row:hover { background: var(--surface2); }
.user-row.selected { background: var(--accent-glow); }
.user-av { width: 32px; height: 32px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: 600; font-size: 12px; color: #fff; flex-shrink: 0; }
.user-row-name { font-size: 13px; font-weight: 500; flex: 1; }
.checkmark { color: var(--accent); font-size: 14px; }
.selected-tags { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 10px; min-height: 0; }
.tag { background: var(--accent-glow); border: 1px solid var(--accent); border-radius: 20px; padding: 3px 10px; font-size: 12px; color: var(--accent); display: flex; align-items: center; gap: 5px; }
.tag button { background: none; border: none; color: var(--accent); cursor: pointer; font-size: 14px; line-height: 1; padding: 0; }
.modal-footer { display: flex; gap: 8px; margin-top: 16px; }
.btn-cancel { flex: 1; padding: 11px; background: var(--surface2); color: var(--text-muted); border: 1px solid var(--border); border-radius: 11px; font-family: inherit; font-size: 13px; font-weight: 600; cursor: pointer; transition: all .15s; }
.btn-cancel:hover { color: var(--text); }
.btn-create { flex: 1; padding: 11px; background: var(--accent); color: #fff; border: none; border-radius: 11px; font-family: inherit; font-size: 13px; font-weight: 600; cursor: pointer; transition: all .2s; }
.btn-create:hover { background: var(--accent-dark); }
.btn-create:disabled { background: var(--border); cursor: not-allowed; }

/* CHAT */
.chat-area { flex: 1; display: flex; flex-direction: column; height: 100dvh; min-width: 0; }
.empty-state { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 12px; color: var(--text-muted); }
.empty-icon { font-size: 56px; opacity: .2; }
.empty-state h2 { font-size: 18px; font-weight: 600; color: var(--text); opacity: .4; }
.empty-state p { font-size: 13px; opacity: .4; text-align: center; max-width: 220px; line-height: 1.7; }
.chat-header { padding: 14px 18px; background: var(--surface); border-bottom: 1px solid var(--border); display: flex; align-items: center; gap: 11px; flex-shrink: 0; }
.chat-hav { width: 38px; height: 38px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: 600; font-size: 15px; color: #fff; flex-shrink: 0; }
.chat-hname { font-size: 14px; font-weight: 600; }
.chat-hsub { font-size: 11px; color: var(--accent); margin-top: 1px; }
.msgs { flex: 1; overflow-y: auto; padding: 18px 14px; display: flex; flex-direction: column; gap: 2px; background: var(--bg); }
.date-sep { text-align: center; margin: 12px 0 8px; font-size: 10px; color: var(--text-dim); letter-spacing: .7px; text-transform: uppercase; display: flex; align-items: center; gap: 10px; }
.date-sep::before,.date-sep::after { content: ''; flex: 1; height: 1px; background: var(--border); }
.msg-row { display: flex; align-items: flex-end; gap: 7px; max-width: 70%; }
.msg-row.mine { align-self: flex-end; flex-direction: row-reverse; }
.msg-row.other { align-self: flex-start; }
.msg-av { width: 26px; height: 26px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: 600; font-size: 10px; color: #fff; flex-shrink: 0; }
.bubble { padding: 9px 13px; border-radius: var(--radius); font-size: 13px; line-height: 1.55; word-break: break-word; }
.mine .bubble { background: var(--accent); color: #fff; border-bottom-right-radius: 4px; }
.other .bubble { background: var(--surface2); color: var(--text); border-bottom-left-radius: 4px; border: 1px solid var(--border); }
.sndr { font-size: 10px; font-weight: 700; margin-bottom: 3px; opacity: .85; }
.btime { font-size: 10px; opacity: .55; display: block; text-align: right; margin-top: 3px; }
.mine .btime::after { content: ' ✓✓'; }
.input-area { padding: 11px 14px 15px; background: var(--surface); border-top: 1px solid var(--border); flex-shrink: 0; }
.input-row { display: flex; align-items: flex-end; gap: 9px; }
.msg-ta { flex: 1; background: var(--surface2); border: 1px solid var(--border); border-radius: 20px; color: var(--text); font-family: inherit; font-size: 13px; padding: 10px 15px; outline: none; resize: none; max-height: 110px; overflow-y: auto; line-height: 1.5; transition: border-color .2s; }
.msg-ta:focus { border-color: var(--accent); }
.msg-ta::placeholder { color: var(--text-dim); }
.send-btn { width: 40px; height: 40px; border-radius: 50%; background: var(--accent); border: none; color: #fff; font-size: 15px; cursor: pointer; display: flex; align-items: center; justify-content: center; flex-shrink: 0; transition: all .18s; box-shadow: 0 3px 12px rgba(45,186,78,.3); }
.send-btn:hover { background: var(--accent-dark); transform: scale(1.07); }
.toast { position: fixed; bottom: 22px; left: 50%; transform: translateX(-50%); background: var(--surface3); border: 1px solid var(--border); border-radius: 11px; padding: 10px 18px; font-size: 13px; z-index: 200; opacity: 0; transition: opacity .3s; pointer-events: none; white-space: nowrap; }
.toast.show { opacity: 1; }
</style>
</head>
<body>

<!-- WAKE UP SCREEN -->
<div id="wake-screen">
  <div class="wake-icon">💬</div>
  <div class="wake-title">ChatFlow</div>
  <div class="wake-sub" id="wake-sub">Waking up the server…</div>
  <div class="wake-dots"><span></span><span></span><span></span></div>
</div>

<!-- AUTH -->
<div id="auth-screen">
  <div class="auth-card">
    <div class="auth-logo">
      <div class="auth-logo-icon">💬</div>
      <h1>ChatFlow</h1>
    </div>
    <div class="auth-tabs">
      <button class="auth-tab active" onclick="setTab('login')">Sign in</button>
      <button class="auth-tab" onclick="setTab('register')">Register</button>
    </div>
    <div class="field"><label>Username</label><input id="a-user" type="text" placeholder="your username" autocomplete="username"></div>
    <div class="field"><label>Password</label><input id="a-pass" type="password" placeholder="••••••••" autocomplete="current-password"></div>
    <div class="err" id="a-err"></div>
    <button class="btn-primary" onclick="doAuth()">Continue →</button>
  </div>
</div>

<!-- APP -->
<div id="app">
  <aside class="sidebar">
    <div class="sidebar-header">
      <div class="sidebar-top">
        <div class="me-av" id="me-av"></div>
        <div class="sidebar-title">ChatFlow</div>
        <button class="icon-btn" title="New DM / Group" onclick="openModal()">✏️</button>
        <button class="icon-btn" title="Sign out" onclick="logout()">🚪</button>
      </div>
      <div class="search-wrap">
        <span>🔍</span>
        <input type="text" placeholder="Search…" oninput="filterConvs(this.value)">
      </div>
    </div>
    <div class="conv-list" id="conv-list"></div>
  </aside>

  <div class="chat-area" id="empty-chat">
    <div class="empty-state">
      <div class="empty-icon">💬</div>
      <h2>No chat open</h2>
      <p>Pick a conversation or start a new one with ✏️</p>
    </div>
  </div>

  <div class="chat-area" id="active-chat" style="display:none;">
    <div class="chat-header">
      <div class="chat-hav" id="c-av"></div>
      <div><div class="chat-hname" id="c-name"></div><div class="chat-hsub" id="c-sub"></div></div>
    </div>
    <div class="msgs" id="msgs"></div>
    <div class="input-area">
      <div class="input-row">
        <textarea class="msg-ta" id="msg-ta" rows="1" placeholder="Type a message…"
          onkeydown="handleKey(event)" oninput="autoResize(this)"></textarea>
        <button class="send-btn" onclick="send()">➤</button>
      </div>
    </div>
  </div>
</div>

<!-- NEW CHAT MODAL -->
<div class="overlay" id="modal" onclick="if(event.target===this)closeModal()">
  <div class="modal">
    <h3>New Conversation</h3>
    <div class="modal-tabs">
      <button class="modal-tab active" onclick="setModalTab('dm')">💬 Direct Message</button>
      <button class="modal-tab" onclick="setModalTab('group')">👥 Group Chat</button>
    </div>

    <!-- DM tab -->
    <div id="tab-dm">
      <input class="modal-input" id="dm-search" type="text" placeholder="Search users…" oninput="searchUsers(this.value, 'dm')">
      <div class="user-results" id="dm-results"></div>
    </div>

    <!-- Group tab -->
    <div id="tab-group" style="display:none;">
      <input class="modal-input" id="group-name" type="text" placeholder="Group name…">
      <input class="modal-input" id="group-search" type="text" placeholder="Add members…" oninput="searchUsers(this.value, 'group')">
      <div class="selected-tags" id="selected-tags"></div>
      <div class="user-results" id="group-results"></div>
      <div class="modal-footer">
        <button class="btn-cancel" onclick="closeModal()">Cancel</button>
        <button class="btn-create" id="create-group-btn" onclick="createGroup()">Create Group</button>
      </div>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const API = '';
let token = localStorage.getItem('cf_token');
let me = JSON.parse(localStorage.getItem('cf_user') || 'null');
let conversations = [];
let currentConvoId = null;
let lastMsgTime = 0;
let pollTimer = null;
let modalTab = 'dm';
let selectedMembers = []; // { username, avatar_color }

// ── WAKE UP ──
async function wakeServer() {
  const subEl = document.getElementById('wake-sub');
  let attempts = 0;
  while (true) {
    try {
      const res = await fetch('/api/ping', { signal: AbortSignal.timeout(8000) });
      if (res.ok) break;
    } catch(e) {}
    attempts++;
    if (attempts === 1) subEl.textContent = 'Still waking up… (this takes ~30s on first load)';
    if (attempts === 3) subEl.textContent = 'Almost there…';
    await new Promise(r => setTimeout(r, 3000));
  }
  document.getElementById('wake-screen').style.display = 'none';
  if (token && me) {
    initApp();
  } else {
    document.getElementById('auth-screen').style.display = 'flex';
  }
}
wakeServer();

// ── AUTH ──
let authTab = 'login';
function setTab(t) {
  authTab = t;
  document.querySelectorAll('.auth-tab').forEach((b,i) => {
    b.classList.toggle('active', (i===0&&t==='login')||(i===1&&t==='register'));
  });
  document.getElementById('a-err').style.display = 'none';
}
async function doAuth() {
  const username = document.getElementById('a-user').value.trim();
  const password = document.getElementById('a-pass').value;
  const errEl = document.getElementById('a-err');
  errEl.style.display = 'none';
  if (!username || !password) { showAuthErr('Fill in both fields'); return; }
  try {
    const res = await fetch(`/api/${authTab}`, {
      method: 'POST', headers: {'Content-Type':'application/json'},
      body: JSON.stringify({ username, password })
    });
    const data = await res.json();
    if (!res.ok) { showAuthErr(data.error || 'Error'); return; }
    token = data.token; me = data.user;
    localStorage.setItem('cf_token', token);
    localStorage.setItem('cf_user', JSON.stringify(me));
    document.getElementById('auth-screen').style.display = 'none';
    initApp();
  } catch(e) { showAuthErr('Connection error'); }
}
function showAuthErr(msg) {
  const el = document.getElementById('a-err');
  el.textContent = msg; el.style.display = 'block';
}
function logout() {
  localStorage.removeItem('cf_token'); localStorage.removeItem('cf_user');
  location.reload();
}
document.getElementById('a-pass').addEventListener('keydown', e => { if(e.key==='Enter') doAuth(); });

// ── INIT ──
function initApp() {
  document.getElementById('app').style.display = 'flex';
  const av = document.getElementById('me-av');
  av.style.background = me.avatar_color;
  av.textContent = me.username[0].toUpperCase();
  av.title = me.username;
  loadConversations();
}

// ── CONVERSATIONS ──
async function loadConversations() {
  const res = await fetch('/api/conversations', { headers: auth() });
  conversations = await res.json();
  renderConvList(conversations);
}

function renderConvList(convos) {
  const el = document.getElementById('conv-list');
  if (!convos.length) {
    el.innerHTML = `<div class="no-convos">No conversations yet.<br>Hit ✏️ to start one!</div>`;
    return;
  }
  el.innerHTML = convos.map(c => {
    const name = c.display_name || c.name || '?';
    const color = c.avatar_color || '#7d8590';
    const preview = c.last_message ? esc(c.last_message) : '<em style="opacity:.4">No messages</em>';
    const time = c.last_message_time ? fmtTime(c.last_message_time) : '';
    return `<div class="conv-item ${c.id===currentConvoId?'active':''}" onclick="openConvo(${c.id})">
      <div class="conv-av" style="background:${color}">
        ${name[0].toUpperCase()}
        ${c.is_group ? '<div class="group-dot">👥</div>' : ''}
      </div>
      <div class="conv-info">
        <div class="conv-name">${esc(name)}</div>
        <div class="conv-preview">${preview}</div>
      </div>
      <div class="conv-time">${time}</div>
    </div>`;
  }).join('');
}

function filterConvs(q) {
  const filtered = q ? conversations.filter(c => (c.display_name||c.name||'').toLowerCase().includes(q.toLowerCase())) : conversations;
  renderConvList(filtered);
}

async function openConvo(id) {
  currentConvoId = id; lastMsgTime = 0;
  const convo = conversations.find(c => c.id === id);
  document.getElementById('empty-chat').style.display = 'none';
  document.getElementById('active-chat').style.display = 'flex';
  const name = convo.display_name || convo.name;
  const color = convo.avatar_color || '#7d8590';
  document.getElementById('c-av').style.background = color;
  document.getElementById('c-av').textContent = name[0].toUpperCase();
  document.getElementById('c-name').textContent = name;
  document.getElementById('c-sub').textContent = convo.is_group
    ? `${convo.members.length} members` : 'online';
  renderConvList(conversations);
  const res = await fetch(`/api/messages/${id}`, { headers: auth() });
  const msgs = await res.json();
  renderMsgs(msgs);
  if (msgs.length) lastMsgTime = msgs[msgs.length-1].sent_at;
  clearInterval(pollTimer);
  pollTimer = setInterval(poll, 2000);
  document.getElementById('msg-ta').focus();
}

// ── MESSAGES ──
function renderMsgs(msgs) {
  const el = document.getElementById('msgs');
  el.innerHTML = '';
  let lastDate = '';
  const convo = conversations.find(c => c.id === currentConvoId);
  const isGroup = convo && convo.is_group;
  msgs.forEach(m => {
    const d = new Date(m.sent_at*1000).toLocaleDateString('en-US',{weekday:'long',month:'long',day:'numeric'});
    if (d !== lastDate) { el.innerHTML += `<div class="date-sep">${d}</div>`; lastDate = d; }
    el.innerHTML += msgHTML(m, isGroup);
  });
  el.scrollTop = el.scrollHeight;
}

function msgHTML(m, isGroup) {
  const isMine = m.sender_id === me.id;
  const t = new Date(m.sent_at*1000).toLocaleTimeString('en-US',{hour:'2-digit',minute:'2-digit'});
  return `<div class="msg-row ${isMine?'mine':'other'}">
    ${!isMine ? `<div class="msg-av" style="background:${m.avatar_color}">${m.username[0].toUpperCase()}</div>` : ''}
    <div class="bubble">
      ${(!isMine && isGroup) ? `<div class="sndr" style="color:${m.avatar_color}">${esc(m.username)}</div>` : ''}
      ${esc(m.content)}
      <span class="btime">${t}</span>
    </div>
  </div>`;
}

function appendMsg(m) {
  const el = document.getElementById('msgs');
  const convo = conversations.find(c => c.id === currentConvoId);
  el.insertAdjacentHTML('beforeend', msgHTML(m, convo && convo.is_group));
  el.scrollTop = el.scrollHeight;
}

async function poll() {
  if (!currentConvoId) return;
  try {
    const res = await fetch(`/api/poll/${currentConvoId}?after=${lastMsgTime}`, { headers: auth() });
    const msgs = await res.json();
    if (msgs.length) {
      msgs.forEach(appendMsg);
      lastMsgTime = msgs[msgs.length-1].sent_at;
      loadConversations();
    }
  } catch(e) {}
}

async function send() {
  const ta = document.getElementById('msg-ta');
  const content = ta.value.trim();
  if (!content || !currentConvoId) return;
  ta.value = ''; autoResize(ta);
  const res = await fetch(`/api/messages/${currentConvoId}`, {
    method: 'POST', headers: {...auth(),'Content-Type':'application/json'},
    body: JSON.stringify({ content })
  });
  if (res.ok) {
    const msg = await res.json();
    appendMsg(msg);
    lastMsgTime = msg.sent_at;
    loadConversations();
  }
}
function handleKey(e) { if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();send();} }
function autoResize(el) { el.style.height='auto'; el.style.height=Math.min(el.scrollHeight,110)+'px'; }

// ── MODAL ──
function openModal() {
  document.getElementById('modal').classList.add('open');
  setModalTab('dm');
  document.getElementById('dm-search').value = '';
  document.getElementById('dm-results').innerHTML = '';
  setTimeout(() => document.getElementById('dm-search').focus(), 80);
}
function closeModal() {
  document.getElementById('modal').classList.remove('open');
  selectedMembers = [];
  renderSelectedTags();
}
function setModalTab(t) {
  modalTab = t;
  document.querySelectorAll('.modal-tab').forEach((b,i) => b.classList.toggle('active',(i===0&&t==='dm')||(i===1&&t==='group')));
  document.getElementById('tab-dm').style.display = t==='dm' ? '' : 'none';
  document.getElementById('tab-group').style.display = t==='group' ? '' : 'none';
}

let searchTimer;
function searchUsers(q, mode) {
  clearTimeout(searchTimer);
  const resultsEl = document.getElementById(mode==='dm' ? 'dm-results' : 'group-results');
  if (!q.trim()) { resultsEl.innerHTML = ''; return; }
  searchTimer = setTimeout(async () => {
    const res = await fetch(`/api/users/search?q=${encodeURIComponent(q)}`, { headers: auth() });
    const users = await res.json();
    if (!users.length) { resultsEl.innerHTML = `<div style="padding:10px;color:var(--text-muted);font-size:12px;">No users found</div>`; return; }
    resultsEl.innerHTML = users.map(u => {
      if (mode === 'dm') {
        return `<div class="user-row" onclick="startDM('${u.username}')">
          <div class="user-av" style="background:${u.avatar_color}">${u.username[0].toUpperCase()}</div>
          <span class="user-row-name">${esc(u.username)}</span>
        </div>`;
      } else {
        const sel = selectedMembers.find(m => m.username === u.username);
        return `<div class="user-row ${sel?'selected':''}" onclick="toggleMember(${JSON.stringify(u).replace(/"/g,'&quot;')})">
          <div class="user-av" style="background:${u.avatar_color}">${u.username[0].toUpperCase()}</div>
          <span class="user-row-name">${esc(u.username)}</span>
          ${sel ? '<span class="checkmark">✓</span>' : ''}
        </div>`;
      }
    }).join('');
  }, 200);
}

function toggleMember(u) {
  const idx = selectedMembers.findIndex(m => m.username === u.username);
  if (idx >= 0) selectedMembers.splice(idx, 1);
  else selectedMembers.push(u);
  renderSelectedTags();
  searchUsers(document.getElementById('group-search').value, 'group');
}

function renderSelectedTags() {
  const el = document.getElementById('selected-tags');
  el.innerHTML = selectedMembers.map(m => `
    <div class="tag">
      ${esc(m.username)}
      <button onclick="toggleMember(${JSON.stringify(m).replace(/"/g,'&quot;')})">×</button>
    </div>`).join('');
}

async function startDM(username) {
  closeModal();
  const res = await fetch('/api/conversations', {
    method: 'POST', headers: {...auth(),'Content-Type':'application/json'},
    body: JSON.stringify({ username })
  });
  const data = await res.json();
  if (data.id) { await loadConversations(); openConvo(data.id); }
}

async function createGroup() {
  const name = document.getElementById('group-name').value.trim();
  if (!name) { toast('Enter a group name'); return; }
  if (!selectedMembers.length) { toast('Add at least one member'); return; }
  const res = await fetch('/api/conversations', {
    method: 'POST', headers: {...auth(),'Content-Type':'application/json'},
    body: JSON.stringify({ group_name: name, members: selectedMembers.map(m => m.username) })
  });
  const data = await res.json();
  closeModal();
  if (data.id) { await loadConversations(); openConvo(data.id); }
}

// ── HELPERS ──
function auth() { return { 'Authorization': `Bearer ${token}` }; }
function esc(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/\n/g,'<br>'); }
function fmtTime(ts) {
  const diff = (Date.now()/1000) - ts;
  if (diff < 60) return 'now';
  if (diff < 3600) return Math.floor(diff/60)+'m';
  if (diff < 86400) return new Date(ts*1000).toLocaleTimeString('en-US',{hour:'2-digit',minute:'2-digit'});
  return new Date(ts*1000).toLocaleDateString('en-US',{month:'short',day:'numeric'});
}
function toast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg; el.classList.add('show');
  setTimeout(() => el.classList.remove('show'), 2500);
}
</script>
